name: Lint R

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: lintr
          extra-packages: |
            any::tidyr
            any::dplyr
            any::ggplot2
            any::ggrepel
            any::scales
            any::moments
            any::Hmisc
            any::psych
            any::nFactors
            any::qgraph

      - name: Lint
        run: |
          library(lintr)
          lints <- lint_dir(".", pattern = "\\.R$")
          if (length(lints) > 0) {
            print(lints)
            stop("Linting errors found")
          }
          cat("No linting issues found!\n")
        shell: Rscript {0}
